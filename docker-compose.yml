version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: schoolsphere-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: schoolsphere
      POSTGRES_PASSWORD: schoolsphere_pass
      POSTGRES_DB: schoolsphere
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U schoolsphere']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schoolsphere-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://schoolsphere:schoolsphere_pass@postgres:5432/schoolsphere
      JWT_SECRET: your_jwt_secret_here_min_32_chars_change_this
      JWT_REFRESH_SECRET: your_refresh_secret_change_this
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_KEY: internal_secret_key_change_this
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ── AI Microservice (Python) ───────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: schoolsphere-ai
    restart: unless-stopped
    environment:
      AI_SERVICE_KEY: internal_secret_key_change_this
      DEFAULT_AI_PROVIDER: gemini
      DEFAULT_AI_API_KEY: your_gemini_key_here
    ports:
      - '8000:8000'
    volumes:
      - ./ai-service:/app

  # ── Frontend (React) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schoolsphere-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
